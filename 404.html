<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0f" />
  <meta name="robots" content="noindex" />
  <title>EatPrime · Página não encontrada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0b0f;
      --gold: #c9a646;
      --gold-soft: #d9ba6b;
      --text: #efeae0;
      --text-dim: #a09a8e;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 22px;
      text-align: center;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at top, rgba(201, 166, 70, 0.06), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    .wrap { position: relative; z-index: 1; max-width: 520px; }
    .big {
      font-family: 'Fraunces', serif;
      font-size: clamp(72px, 14vw, 120px);
      font-weight: 600;
      color: var(--gold);
      line-height: 1;
      letter-spacing: -0.04em;
      margin: 0 0 10px;
      font-style: italic;
    }
    h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(22px, 4vw, 30px);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 14px;
    }
    p {
      color: var(--text-dim);
      font-size: 15px;
      line-height: 1.6;
      margin: 0 0 26px;
    }
    a {
      display: inline-block;
      background: linear-gradient(135deg, var(--gold), var(--gold-soft));
      color: var(--bg);
      padding: 14px 28px;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    a:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(201, 166, 70, 0.35);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="big">404</div>
    <h1>Essa mesa não existe.</h1>
    <p>O prato que você procurava saiu do menu ou você digitou algo torto.</p>
    <a href="./">Voltar pra curadoria</a>
  </div>
</body>
</html>
