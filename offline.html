<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0f" />
  <title>EatPrime · Você está offline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0b0f;
      --surface: #1c1c28;
      --gold: #c9a646;
      --gold-soft: #d9ba6b;
      --text: #efeae0;
      --text-dim: #a09a8e;
      --border: rgba(201, 166, 70, 0.18);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 22px;
      text-align: center;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at top, rgba(201, 166, 70, 0.06), transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(201, 166, 70, 0.03), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    .wrap { position: relative; z-index: 1; max-width: 520px; }
    .logo {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--gold), #8a7132);
      display: grid;
      place-items: center;
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 28px;
      color: var(--bg);
      margin: 0 auto 22px;
      box-shadow: 0 4px 14px rgba(201, 166, 70, 0.25);
    }
    h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 14px;
    }
    h1 em { color: var(--gold); font-style: italic; }
    p {
      color: var(--text-dim);
      font-size: 16px;
      line-height: 1.6;
      margin: 0 0 26px;
    }
    button {
      font-family: inherit;
      background: linear-gradient(135deg, var(--gold), var(--gold-soft));
      color: var(--bg);
      border: none;
      padding: 14px 28px;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(201, 166, 70, 0.35);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">E</div>
    <h1>Sem conexão <em>no momento.</em></h1>
    <p>Você está offline. Assim que voltar o sinal, a curadoria EatPrime volta no ar.</p>
    <button onclick="location.reload()">Tentar de novo</button>
  </div>
</body>
</html>
